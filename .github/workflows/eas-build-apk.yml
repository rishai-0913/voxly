name: EAS Build APK (manual)

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Bump version and commit
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('mobile/app.json', 'utf8'));
            let [major, minor, patch] = app.expo.version.split('.').map(Number);
            const bump = '${{ github.event.inputs.version_bump }}';
            if (bump === 'major') { major++; minor = 0; patch = 0; }
            else if (bump === 'minor') { minor++; patch = 0; }
            else { patch++; }
            app.expo.version = major + '.' + minor + '.' + patch;
            fs.writeFileSync('mobile/app.json', JSON.stringify(app, null, 2) + '\n');
            console.log('Version bumped to', app.expo.version);
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/app.json
          git commit -m "chore: bump version to $(node -p "require('./mobile/app.json').expo.version")"
          git push origin dev

      - name: Build APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://voxly-ybte.onrender.com
