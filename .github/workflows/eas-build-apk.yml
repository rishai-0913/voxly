name: EAS Build APK (manual)

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Bump version
        working-directory: mobile
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            const [major, minor] = app.expo.version.split('.').map(Number);
            app.expo.version = major + '.' + minor + '.' + ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Version set to', app.expo.version);
          "

      - name: Build APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://voxly-ybte.onrender.com
