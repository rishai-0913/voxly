name: EAS Update & Build

on:
  push:
    branches:
      - dev

jobs:
  update:
    name: Publish EAS Update (Expo Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Publish update
        working-directory: mobile
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci --legacy-peer-deps

      - name: Build APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive

  tag:
    name: Tag release
    runs-on: ubuntu-latest
    needs: [update, build-apk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create version tag
        run: |
          VERSION=$(node -p "require('./mobile/app.json').expo.version")
          TAG="v${VERSION}-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
