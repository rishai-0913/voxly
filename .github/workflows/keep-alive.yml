name: Keep backend alive

on:
  schedule:
    - cron: "*/10 23,0-16 * * *"  # every 10 min, 5 AM–10 PM IST (23:30–16:30 UTC)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://voxly-ybte.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Backend returned $STATUS"
            exit 1
          fi
